# AWS App Runner (GitHub source) — managed Node.js 22 build.
# Mirrors Dockerfile.cloudrun: server deps + client build, then node server/index.js
version: 1.0
runtime: nodejs22
build:
  commands:
    build:
      - npm install --omit=dev
      - cd client && npm install && npm run build
run:
  command: node server/index.js
  network:
    port: 8080
  env:
    - name: NODE_ENV
      value: production
